<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rutt-Etra Engine v1.2 (Equilibrado) - Borsec</title>
    <style>
        /* ESTÁTICA VENTANA FIJA BORSEC */
        body { margin: 0; background: #018281; font-family: 'MS Sans Serif', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .window-container { width: 1000px; background: #c0c0c0; border: 2px solid #fff; box-shadow: 2px 2px 0px #000; display: flex; flex-direction: column; padding: 2px; box-sizing: border-box; }
        
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); padding: 3px 5px; display: flex; justify-content: space-between; color: white; font-weight: bold; font-size: 12px; }

        /* VISOR: ALTURA FIJA PARA MANTENER PROPORCIÓN 3D */
        .viewport { background: #000; margin: 5px; border: 4px inset #ffffff; height: 520px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: cover; /* Cambiado a cover para llenar el espacio */ }

        .control-panel { background: #c0c0c0; padding: 12px; border-top: 2px solid #fff; display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 15px; }

        .group { border: 2px groove #fff; padding: 10px; display: flex; flex-direction: column; gap: 6px; position: relative; }
        .group-title { font-size: 11px; font-weight: bold; position: absolute; top: -10px; left: 10px; background: #c0c0c0; padding: 0 5px; color: #000; }

        label { font-size: 11px; display: flex; justify-content: space-between; color: #000; }
        .val { color: #000080; font-weight: bold; font-family: Consolas, monospace; }
        input[type=range] { width: 100%; cursor: pointer; height: 20px; accent-color: #000080; }

        .win-btn { background: #c0c0c0; border: 2px outset #fff; padding: 6px; font-family: inherit; font-size: 10px; cursor: pointer; box-shadow: 1px 1px #000; font-weight: bold; text-transform: uppercase; color: #000; }
        .win-btn:active { border: 2px inset #fff; box-shadow: none; padding: 7px 5px 5px 7px; }
        .active { background: #e0e0e0; color: #008000 !important; border: 2px inset #fff; }

        video, #fileInput { display: none; }

        /* RESPONSIVE: AJUSTE SIN ACHATAR */
        @media (max-width: 800px) {
            .window-container { width: 98vw; margin: 0; }
            .viewport { height: 320px; /* Reducimos altura para que quepan controles */ }
            .control-panel { grid-template-columns: 1fr; overflow-y: auto; max-height: 45vh; padding: 8px; }
            input[type=range] { height: 25px; /* Más fácil de tocar */ }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="window-container">
    <div class="title-bar"><span>RuttEtra_Visual_Engine.exe</span></div>
    <div class="viewport"><canvas id="canvas"></canvas></div>
    <div class="control-panel">
        <div class="group">
            <span class="group-title">Image Processing</span>
            <label>Density <span id="v-density" class="val">70</span></label>
            <input type="range" id="density" min="15" max="150" value="70">
            <label>Relief <span id="v-relieve" class="val">30</span></label>
            <input type="range" id="relieve" min="0" max="100" value="30">
        </div>
        <div class="group">
            <span class="group-title">Geometry Engine</span>
            <label>Horizontal <span id="v-horizontal" class="val">0</span></label>
            <input type="range" id="horizontal" min="-180" max="180" value="0">
            <label>Vertical <span id="v-vertical" class="val">15</span></label>
            <input type="range" id="vertical" min="-90" max="90" value="15">
            <label>Zoom <span id="v-zoom" class="val">1.0</span></label>
            <input type="range" id="zoom" min="0.4" max="4" step="0.1" value="1">
        </div>
        <div class="group">
            <span class="group-title">Inputs</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                <button id="btnOpen" class="win-btn">VIDEO</button>
                <button id="btnCam" class="win-btn">CAM</button>
                <button id="btnMic" class="win-btn">MIC</button>
                <button id="btnInv" class="win-btn">INV</button>
            </div>
            <button id="btnSnap" class="win-btn" style="margin-top:5px;">SNAP FRAME</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept="video/*">
<video id="video" loop muted playsinline src="welcome_video.mp4" crossorigin="anonymous"></video>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const video = document.getElementById('video');
    const fileInput = document.getElementById('fileInput');
    
    // Buffer interno de alta resolución constante
    canvas.width = 1280; canvas.height = 720; 

    let settings = { density: 70, relieve: 30, horizontal: 0, vertical: 15, zoom: 1, inverse: false, micActive: false };
    let smoothH = 0, audioLevel = 0;
    let audioContext, analyser, dataArray;

    document.querySelectorAll('input[type=range]').forEach(input => {
        input.oninput = (e) => { 
            settings[e.target.id] = parseFloat(e.target.value); 
            if(document.getElementById('v-'+e.target.id)) document.getElementById('v-'+e.target.id).innerText = e.target.value;
        };
    });

    document.getElementById('btnOpen').onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files[0]) { video.srcObject = null; video.src = URL.createObjectURL(e.target.files[0]); video.play(); } };
    
    document.getElementById('btnInv').onclick = (e) => { settings.inverse = !settings.inverse; e.target.classList.toggle('active'); };

    document.getElementById('btnCam').onclick = async (e) => {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            video.src = ""; video.srcObject = s; video.play(); e.target.classList.add('active');
        } catch(err) { alert("Cam Error"); }
    };

    document.getElementById('btnMic').onclick = async (e) => {
        if (!settings.micActive) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext();
                analyser = audioContext.createAnalyser();
                audioContext.createMediaStreamSource(s).connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                settings.micActive = true; e.target.classList.add('active');
            } catch(err) { alert("Mic Error"); }
        }
    };

    // SNAP FRAME MEJORADO
    document.getElementById('btnSnap').onclick = () => {
        const link = document.createElement('a');
        link.download = `RuttEtra_Borsec_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    };

    function draw() {
        ctx.fillStyle = settings.inverse ? '#fff' : '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (video.readyState >= 2) {
            if (settings.micActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                audioLevel += ((sum/dataArray.length)*2.5 - audioLevel) * 0.48;
            }

            // Procesamiento de imagen interno (fijo para estabilidad)
            const procW = 200, procH = 150;
            const tCanvas = document.createElement('canvas');
            tCanvas.width = procW; tCanvas.height = procH;
            tCanvas.getContext('2d').drawImage(video, 0, 0, procW, procH);
            const data = tCanvas.getContext('2d').getImageData(0, 0, procW, procH).data;

            // Grosor de línea adaptativo para que no desaparezca en móvil
            ctx.lineWidth = settings.density < 50 ? 2 : 1.2; 
            ctx.strokeStyle = settings.inverse ? '#000' : '#fff';
            
            smoothH += (settings.horizontal - smoothH) * 0.2;
            const radV = -settings.vertical * (Math.PI/180), radH = smoothH * (Math.PI/180);
            const cv = Math.cos(radV), sv = Math.sin(radV), ch = Math.cos(radH), sh = Math.sin(radH);

            // --- ECUACIÓN EQUILIBRADA ---
            // Aumentamos el relieve por 45 para compensar la reducción visual
            const rel = (settings.micActive ? audioLevel : settings.relieve) * 45 * settings.zoom;
            
            // Escala adaptativa: Detecta el ancho real de la ventana para proyectar
            const currentWidth = canvas.clientWidth || 1000;
            const scale = (canvas.width / procW) * settings.zoom * (currentWidth / 1000);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const stepY = Math.max(2, Math.floor(procH / (settings.density / 1.5)));

            for (let y = 0; y < procH; y += stepY) {
                ctx.beginPath();
                for (let x = 0; x < procW; x += 2) {
                    const i = (y * procW + x) * 4;
                    const b = (data[i] + data[i+1] + data[i+2]) / 3;
                    
                    // Cálculo de Z (profundidad)
                    const z = (b/255 - 0.5) * rel;
                    
                    // Proyección 3D corregida
                    const nx = (x - procW/2) * scale;
                    const ny = (y - procH/2) * scale * 1.3; // Un poco más de estiramiento vertical
                    
                    // Rotación
                    const yRot = ny * cv - z * sv;
                    const zPrime = ny * sv + z * cv;
                    const xFinal = nx * ch + (zPrime * 0.12) * sh; // Factor de profundidad en H
                    
                    if (x === 0) ctx.moveTo(xFinal + centerX, yRot + centerY);
                    else ctx.lineTo(xFinal + centerX, yRot + centerY);
                }
                ctx.stroke();
            }
        }
        requestAnimationFrame(draw);
    }

    // Iniciar el motor
    draw();

    // Asegurar autoplay si el navegador bloquea
    window.addEventListener('click', () => { if(video.paused) video.play(); }, { once: true });
</script>
</body>
</html>
